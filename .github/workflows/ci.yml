name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -A dead_code
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Cache apt packages
        id: cache-apt
        uses: actions/cache@v5
        with:
          path: ~/apt-cache
          key: apt-tauri-deps-noble-v1
      - name: Install system dependencies
        run: |
          if [ -d ~/apt-cache ]; then
            sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          mkdir -p ~/apt-cache
          cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings -A dead_code
      - name: Test
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Build
        run: cargo build --manifest-path src-tauri/Cargo.toml

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test -- --run --passWithNoTests
      - run: npm run build

  custom-linters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - run: bash scripts/lint/run-all.sh
